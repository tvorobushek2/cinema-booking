services:
  # PostgreSQL — база данных
  db:
    image: postgres:15-alpine
    container_name: cinema_db
    restart: always
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: cinema_user
      POSTGRES_PASSWORD: cinema_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema_user -d cinema"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis — кэш и брокер для Celery
  redis:
    image: redis:7-alpine
    container_name: cinema_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

